name: aviagent

x-redis-env: &redis-env
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}

x-celery-env: &celery-env
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
  CELERY_TASK_DEFAULT_QUEUE: avia.tasks
  CELERY_EXECUTION_QUEUE: avia.execution

x-data-env: &data-env
  DATABASE_URL: ${DATABASE_URL:-postgresql://avia_user:avia_pass@postgres:5432/avia_db}
  MONGO_URI: ${MONGO_URI:-mongodb://root:aviaroot@mongo:27017/avia_dev?authSource=admin}
  <<: *redis-env
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-aviadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-aviadmin123}
  MINIO_BUCKET: ${MINIO_BUCKET:-avia-data}
  MINIO_SECURE: ${MINIO_SECURE:-false}
  QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-avia_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-avia_pass}
      POSTGRES_DB: ${POSTGRES_DB:-avia_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-avia_user} -d ${POSTGRES_DB:-avia_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - avia-net

  mongo:
    image: mongo:6
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-aviaroot}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - avia-net

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - avia-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-aviadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-aviadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9004:9000"
      - "9005:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - avia-net

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY:-aviadmin} $${MINIO_SECRET_KEY:-aviadmin123};
      mc mb local/$${MINIO_BUCKET:-avia-data} --ignore-existing;
      exit 0;
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-aviadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-aviadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-avia-data}
    networks:
      - avia-net

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6335:6333"
    networks:
      - avia-net

  auth:
    build:
      context: ./AviaAuth
    command: >
      sh -c "python manage.py migrate_schemas --shared &&
             python manage.py migrate_schemas &&
             python manage.py seed_demo || true &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8002 --workers 2"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *data-env
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-true}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,auth}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8091}
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/healthz/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - avia-net

  api:
    build:
      context: ./AviaBackend
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8011"]
    depends_on:
      auth:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: [*data-env, *celery-env]
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth:8002}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai:8012}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8091}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8011:8011"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - avia-net

  ai:
    build:
      context: ./AviaAI
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8012"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *data-env
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5-coder:7b}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      HUGGINGFACE_MODEL: ${HUGGINGFACE_MODEL:-Qwen/Qwen2.5-Coder-7B-Instruct}
      HUGGINGFACE_BASE_URL: ${HUGGINGFACE_BASE_URL:-https://router.huggingface.co/v1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_DEFAULT_MODEL: ${GEMINI_DEFAULT_MODEL:-gemini-2.5-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-haiku-20241022}
      API_SERVICE_URL: http://api:8011
    ports:
      - "8012:8012"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - avia-net

  worker:
    build:
      context: ./AviaWorker
    command: ["celery", "-A", "celery_app", "worker", "--loglevel=info", "-Q", "avia.execution,avia.tasks", "--concurrency=2"]
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: [*data-env, *celery-env]
    networks:
      - avia-net

  frontend:
    build:
      context: ./AviaFrontend
    depends_on:
      api:
        condition: service_healthy
      auth:
        condition: service_healthy
    ports:
      - "8091:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - avia-net

volumes:
  postgres_data:
  mongo_data:
  minio_data:
  qdrant_data:

networks:
  avia-net:
    driver: bridge
