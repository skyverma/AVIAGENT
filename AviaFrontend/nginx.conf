server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 1G;

    location /auth/ {
        proxy_pass http://auth:8002/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/normal/analyze {
        proxy_pass http://api:8011/api/normal/analyze;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1800s;
    }

    location /api/ {
        proxy_pass http://api:8011/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 1800s;
        client_max_body_size 1G;
    }

    location /ai/api/ {
        proxy_pass http://ai:8012/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 1800s;
    }

    location /health {
        proxy_pass http://api:8011/health;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
